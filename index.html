<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#131314] text-gray-200 font-sans h-screen overflow-hidden" x-data="chatApp()" x-init="init()">

    <div class="flex h-full">
        
        <aside class="w-64 bg-[#1e1f20] flex-shrink-0 flex flex-col transition-all duration-300" :class="sidebarOpen ? 'ml-0' : '-ml-64'">
            <div class="p-4">
                <button @click="createNewChat()" class="w-full flex items-center gap-3 px-4 py-3 bg-[#2b2c2e] hover:bg-[#37393b] rounded-full text-sm transition">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-2 space-y-1">
                <template x-for="chat in chatHistory" :key="chat.id">
                    <div @click="loadChat(chat.id)" 
                         :class="currentChatId === chat.id ? 'bg-[#2d2f31]' : 'hover:bg-[#2d2f31]'"
                         class="group flex items-center justify-between px-4 py-2 rounded-lg cursor-pointer text-sm">
                        <div class="flex items-center gap-3 truncate">
                            <i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>
                            <span x-text="chat.title" class="truncate"></span>
                        </div>
                        <button @click.stop="deleteChat(chat.id)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                </template>
            </div>

            <div class="p-4 border-t border-gray-700">
                <button @click="showSettings = true" class="flex items-center gap-3 w-full px-4 py-2 hover:bg-[#2d2f31] rounded-lg text-sm">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative h-full">
            <header class="p-4 flex justify-between items-center">
                <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:bg-[#2d2f31] rounded-full">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="text-xl font-medium text-gray-400">Gemini <span class="text-blue-500 text-sm">Clone</span></div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-500"></div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:px-24 lg:px-64 space-y-8" id="chat-container">
                <template x-if="messages.length === 0">
                    <div class="h-full flex flex-col items-center justify-center text-center mt-20">
                        <h1 class="text-4xl font-semibold bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent mb-8">Hello, Dev</h1>
                        <p class="text-gray-400">How can I help you build today?</p>
                    </div>
                </template>

                <template x-for="(msg, index) in messages" :key="index">
                    <div class="flex gap-4 animate-fadeIn" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                        <div :class="msg.role === 'user' ? 'bg-[#2d2f31] max-w-[80%] px-4 py-3 rounded-2xl' : 'w-full'">
                            <div class="flex gap-4">
                                <template x-if="msg.role === 'assistant'">
                                    <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center">
                                        <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                                    </div>
                                </template>
                                <div class="prose prose-invert max-w-none leading-relaxed text-gray-200" x-html="msg.content"></div>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="isLoading" class="flex gap-4 animate-pulse">
                    <div class="w-8 h-8 rounded-full bg-gray-700"></div>
                    <div class="h-4 bg-gray-700 rounded w-1/2 mt-2"></div>
                </div>
            </div>

            <div class="p-4 md:px-24 lg:px-64 bg-[#131314]">
                <div class="relative max-w-4xl mx-auto">
                    <textarea 
                        x-model="userInput"
                        @keydown.enter.prevent="sendMessage()"
                        rows="1"
                        placeholder="Enter a prompt here..."
                        class="w-full bg-[#1e1f20] text-white rounded-2xl py-4 pl-6 pr-16 focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none overflow-hidden"
                    ></textarea>
                    <button @click="sendMessage()" class="absolute right-3 bottom-3 p-2 text-blue-500 hover:bg-[#2d2f31] rounded-full">
                        <i data-lucide="send-horizontal" class="w-6 h-6"></i>
                    </button>
                </div>
                <p class="text-center text-xs text-gray-500 mt-4">Universal AI may display inaccurate info. Check your API settings.</p>
            </div>
        </main>
    </div>

    <div x-show="showSettings" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm">
        <div class="bg-[#1e1f20] w-full max-w-md p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4">API Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">OpenRouter API Key</label>
                    <input type="password" x-model="apiKey" class="w-full bg-[#131314] border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Model Name</label>
                    <input type="text" x-model="modelName" placeholder="google/gemini-pro-1.5-exp" class="w-full bg-[#131314] border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button @click="showSettings = false" class="px-4 py-2 text-sm hover:bg-[#2d2f31] rounded-lg">Cancel</button>
                <button @click="saveSettings()" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 rounded-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        function chatApp() {
            return {
                sidebarOpen: true,
                showSettings: false,
                isLoading: false,
                userInput: '',
                apiKey: '',
                modelName: 'google/gemini-pro-1.5-exp',
                currentChatId: null,
                messages: [],
                chatHistory: [],

                init() {
                    this.apiKey = localStorage.getItem('api_key') || '';
                    this.modelName = localStorage.getItem('model_name') || 'google/gemini-pro-1.5-exp';
                    const savedHistory = localStorage.getItem('chat_history');
                    if (savedHistory) this.chatHistory = JSON.parse(savedHistory);
                    lucide.createIcons();
                },

                saveSettings() {
                    localStorage.setItem('api_key', this.apiKey);
                    localStorage.setItem('model_name', this.modelName);
                    this.showSettings = false;
                },

                createNewChat() {
                    this.currentChatId = Date.now();
                    this.messages = [];
                    this.userInput = '';
                },

                async sendMessage() {
                    if (!this.userInput.trim() || !this.apiKey) {
                        if(!this.apiKey) alert('Please add your API key in settings!');
                        return;
                    }

                    const userMsg = { role: 'user', content: this.userInput };
                    this.messages.push(userMsg);
                    const prompt = this.userInput;
                    this.userInput = '';
                    this.isLoading = true;

                    // Update History Sidebar Title if first message
                    if (this.messages.length === 1) {
                        this.currentChatId = Date.now();
                        this.chatHistory.unshift({ id: this.currentChatId, title: prompt.substring(0, 30) + '...', messages: this.messages });
                    }

                    try {
                        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${this.apiKey}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                "model": this.modelName,
                                "messages": this.messages
                            })
                        });

                        const data = await response.json();
                        const aiMsg = { role: 'assistant', content: data.choices[0].message.content };
                        this.messages.push(aiMsg);
                        this.saveHistory();
                    } catch (error) {
                        this.messages.push({ role: 'assistant', content: 'Error: Failed to fetch response. Check API key and model name.' });
                    } finally {
                        this.isLoading = false;
                        this.$nextTick(() => {
                            const container = document.getElementById('chat-container');
                            container.scrollTop = container.scrollHeight;
                            lucide.createIcons();
                        });
                    }
                },

                saveHistory() {
                    const index = this.chatHistory.findIndex(c => c.id === this.currentChatId);
                    if (index !== -1) {
                        this.chatHistory[index].messages = this.messages;
                        localStorage.setItem('chat_history', JSON.stringify(this.chatHistory));
                    }
                },

                loadChat(id) {
                    const chat = this.chatHistory.find(c => c.id === id);
                    if (chat) {
                        this.currentChatId = id;
                        this.messages = [...chat.messages];
                    }
                },

                deleteChat(id) {
                    this.chatHistory = this.chatHistory.filter(c => c.id !== id);
                    localStorage.setItem('chat_history', JSON.stringify(this.chatHistory));
                    if (this.currentChatId === id) this.createNewChat();
                }
            }
        }
    </script>
</body>
</html>
