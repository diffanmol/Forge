<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>

[x-cloak]{display:none!important;}

body{
background:#0f0f10;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.animate-message{
animation:fadeIn .35s ease;
}

.typing-dot{
width:6px;
height:6px;
background:#9ca3af;
border-radius:50%;
animation:typing 1.4s infinite;
}

.typing-dot:nth-child(2){
animation-delay:.2s;
}

.typing-dot:nth-child(3){
animation-delay:.4s;
}

@keyframes typing{
0%{opacity:.2; transform:translateY(0);}
50%{opacity:1; transform:translateY(-3px);}
100%{opacity:.2; transform:translateY(0);}
}

</style>
</head>

<body class="text-gray-200 h-screen overflow-hidden font-sans"
x-data="chatApp()" x-init="init()">

<div class="flex h-full">

<!-- SIDEBAR -->

<aside class="w-64 bg-[#18181b] flex flex-col transition-all duration-300"
:class="sidebarOpen ? 'ml-0' : '-ml-64'">

<div class="p-4">
<button @click="createNewChat()"
class="w-full flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-90 rounded-xl text-sm transition">
<i data-lucide="plus"></i>
New Chat
</button>
</div>

<div class="flex-1 overflow-y-auto px-2 space-y-1">

<template x-for="chat in chatHistory" :key="chat.id">

<div @click="loadChat(chat.id)"
class="group flex items-center justify-between px-4 py-2 rounded-lg cursor-pointer text-sm hover:bg-[#27272a]">

<div class="flex gap-2 items-center truncate">

<i data-lucide="message-square" class="w-4 h-4 text-gray-400"></i>

<span x-text="chat.title" class="truncate"></span>

</div>

<button @click.stop="deleteChat(chat.id)"
class="opacity-0 group-hover:opacity-100 hover:text-red-400">

<i data-lucide="trash-2" class="w-4 h-4"></i>

</button>

</div>

</template>

</div>

<div class="p-4 border-t border-gray-700">

<button @click="showSettings=true"
class="flex items-center gap-2 hover:bg-[#27272a] w-full px-4 py-2 rounded-lg text-sm">

<i data-lucide="settings"></i>

Settings

</button>

</div>

</aside>


<!-- MAIN -->

<main class="flex-1 flex flex-col">

<header class="flex items-center justify-between p-4 border-b border-gray-800">

<button @click="sidebarOpen=!sidebarOpen"
class="p-2 hover:bg-[#27272a] rounded-lg">

<i data-lucide="menu"></i>

</button>

<div class="text-center">

<h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
Forge AI
</h1>

<p class="text-xs text-gray-500">
Owner: diffanmol
</p>

</div>

<div class="w-8"></div>

</header>


<!-- CHAT -->

<div id="chat-container"
class="flex-1 overflow-y-auto p-6 md:px-24 lg:px-64 space-y-6">

<template x-if="messages.length===0">

<div class="text-center mt-24">

<h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
Forge AI
</h1>

<p class="text-gray-400 mt-3">
Your intelligent assistant powered by OpenRouter
</p>

</div>

</template>


<template x-for="(msg,index) in messages" :key="index">

<div class="animate-message flex"
:class="msg.role==='user' ? 'justify-end':'justify-start'">

<div :class="msg.role==='user'
?'bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-3 rounded-2xl max-w-[70%]'
:'flex gap-3 max-w-[90%]'">

<template x-if="msg.role==='assistant'">

<div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">

<i data-lucide="sparkles" class="w-4 h-4 text-white"></i>

</div>

</template>

<div x-html="msg.content"
class="leading-relaxed"></div>

</div>

</div>

</template>


<!-- TYPING -->

<div x-show="isLoading"
class="flex items-center gap-3">

<div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">

<i data-lucide="sparkles" class="w-4 h-4 text-white"></i>

</div>

<div class="flex gap-1">

<div class="typing-dot"></div>

<div class="typing-dot"></div>

<div class="typing-dot"></div>

</div>

</div>

</div>


<!-- INPUT -->

<div class="p-4 md:px-24 lg:px-64">

<div class="relative max-w-4xl mx-auto">

<textarea
x-model="userInput"
@keydown.enter.prevent="sendMessage()"
rows="1"
placeholder="Ask Forge AI anything..."
class="w-full bg-[#18181b] rounded-2xl py-4 pl-6 pr-14 outline-none focus:ring-2 focus:ring-blue-600 resize-none">

</textarea>

<button @click="sendMessage()"
class="absolute right-3 bottom-3 text-blue-400 hover:bg-[#27272a] p-2 rounded-lg">

<i data-lucide="send-horizontal"></i>

</button>

</div>

<p class="text-center text-xs text-gray-500 mt-3">

Forge AI • Powered by OpenRouter • Owner: diffanmol

</p>

</div>

</main>

</div>


<script>

function chatApp(){

return{

sidebarOpen:true,
showSettings:false,
isLoading:false,
userInput:'',
apiKey:'',
modelName:'deepseek/deepseek-chat',

messages:[],
chatHistory:[],
currentChatId:null,

init(){

this.apiKey=localStorage.getItem('api_key')||''

lucide.createIcons()

},

createNewChat(){

this.messages=[]

},

async sendMessage(){

if(!this.userInput.trim())return

const userMsg={role:'user',content:this.userInput}

this.messages.push(userMsg)

const prompt=this.userInput

this.userInput=''

this.isLoading=true

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{

"Authorization":"Bearer "+this.apiKey,

"Content-Type":"application/json"

},

body:JSON.stringify({

model:this.modelName,

messages:this.messages

})

})

const data=await res.json()

const reply=data.choices[0].message.content

this.messages.push({

role:'assistant',

content:reply

})

}catch(e){

this.messages.push({

role:'assistant',

content:"Error connecting to AI."

})

}

this.isLoading=false

this.$nextTick(()=>{

const c=document.getElementById('chat-container')

c.scrollTop=c.scrollHeight

lucide.createIcons()

})

}

}

}

</script>

</body>
</html>
